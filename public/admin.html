<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — Le 37 Partners Lounge</title>
<style>
  :root { --creme:#F5F0E8; --brun:#2C1A0E; --brun2:#5C3D2E; --or:#B8860B; --gris:#9E9082; --vert:#27ae60; --rouge:#e74c3c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0ebe0; color:var(--brun); font-family:Arial,sans-serif; }

  /* LOGIN */
  #ecran-login { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; background:var(--brun); }
  .login-titre { font-family:Georgia,serif; font-size:24px; font-style:italic; color:var(--creme); margin-bottom:8px; }
  .login-sous { font-size:11px; letter-spacing:2px; color:var(--gris); text-transform:uppercase; margin-bottom:32px; }
  .login-box { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:28px; width:100%; max-width:320px; }
  .login-box label { display:block; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gris); margin-bottom:8px; }
  .login-box input { width:100%; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:12px; color:var(--creme); font-size:16px; outline:none; margin-bottom:16px; }
  .login-box input:focus { border-color:var(--or); }
  .btn-login { width:100%; background:var(--or); color:var(--brun); border:none; padding:14px; border-radius:8px; font-size:14px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-weight:bold; }
  .msg-login-erreur { color:#e88; font-size:13px; text-align:center; margin-top:12px; min-height:18px; }

  /* APP */
  #ecran-app { display:none; }
  header { background:var(--brun); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
  header h1 { font-family:Georgia,serif; font-size:18px; color:var(--creme); font-weight:400; }
  .nav-admin { display:flex; gap:6px; padding:12px 16px; background:var(--brun2); overflow-x:auto; scrollbar-width:none; }
  .nav-admin::-webkit-scrollbar { display:none; }
  .nav-btn { flex-shrink:0; background:transparent; border:1px solid rgba(255,255,255,0.2); color:var(--creme); padding:6px 16px; border-radius:20px; font-size:12px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
  .nav-btn.active { background:var(--or); border-color:var(--or); color:var(--brun); }
  .page { display:none; padding:16px; }
  .page.visible { display:block; }

  /* MENU EDITOR */
  .cat-card { background:#fff; border-radius:10px; margin-bottom:16px; box-shadow:0 2px 8px rgba(44,26,14,0.08); overflow:hidden; }
  .cat-header { background:var(--brun); color:var(--creme); padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
  .cat-titre { font-family:Georgia,serif; font-size:16px; font-style:italic; }
  .cat-service { font-size:11px; color:var(--gris); letter-spacing:1px; }
  .plat-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #f0ebe0; }
  .plat-row:last-child { border-bottom:none; }
  .plat-infos { flex:1; }
  .plat-row-nom { font-size:15px; color:var(--brun); font-weight:500; }
  .plat-row-desc { font-size:12px; color:var(--gris); }
  .plat-row-prix { font-size:15px; color:var(--or); font-family:Georgia,serif; min-width:60px; text-align:right; }
  .toggle-actif { width:44px; height:24px; border-radius:12px; border:none; cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; }
  .toggle-actif.on { background:var(--vert); }
  .toggle-actif.off { background:#ccc; }
  .toggle-actif::after { content:''; position:absolute; top:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left 0.2s; }
  .toggle-actif.on::after { left:22px; }
  .toggle-actif.off::after { left:2px; }
  .badge-jour-toggle { font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer; border:none; letter-spacing:1px; flex-shrink:0; }
  .badge-jour-toggle.on { background:var(--or); color:var(--brun); }
  .badge-jour-toggle.off { background:#eee; color:var(--gris); }
  .btn-edit-plat { background:none; border:1px solid var(--gris); color:var(--gris); padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; flex-shrink:0; }
  .btn-edit-plat:hover { border-color:var(--brun); color:var(--brun); }
  .stock-badge { font-size:11px; color:var(--brun2); background:#f0ebe0; border:1px solid #ddd; padding:3px 8px; border-radius:6px; white-space:nowrap; flex-shrink:0; }
  .stock-badge.epuise { background:#fde8e8; color:var(--rouge); border-color:var(--rouge); }
  .btn-add-plat { width:calc(100% - 32px); margin:12px 16px; background:transparent; border:1px dashed var(--or); color:var(--or); padding:10px; border-radius:8px; font-size:13px; cursor:pointer; letter-spacing:1px; }
  .btn-add-plat:hover { background:rgba(184,134,11,0.08); }

  /* MODAL EDIT */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(44,26,14,0.6); z-index:300; align-items:center; justify-content:center; padding:16px; }
  .modal-bg.open { display:flex; }
  .modal-edit { background:var(--creme); border-radius:16px; padding:24px; width:100%; max-width:440px; }
  .modal-edit h3 { font-family:Georgia,serif; font-size:18px; font-style:italic; color:var(--brun); margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gris); margin-bottom:6px; }
  .form-group input, .form-group textarea { width:100%; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:14px; color:var(--brun); outline:none; font-family:Arial,sans-serif; }
  .form-group input:focus, .form-group textarea:focus { border-color:var(--or); }
  .form-group textarea { resize:vertical; min-height:60px; }
  .form-row { display:flex; gap:10px; }
  .form-row .form-group { flex:1; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-sauvegarder { flex:1; background:var(--brun); color:var(--creme); border:none; padding:12px; border-radius:8px; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; }
  .btn-sauvegarder:hover { background:var(--or); color:var(--brun); }
  .btn-annuler { background:transparent; border:1px solid #ddd; color:var(--gris); padding:12px 20px; border-radius:8px; font-size:13px; cursor:pointer; }

  /* HISTORIQUE */
  .hist-toolbar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .hist-toolbar label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gris); }
  .hist-toolbar input, .hist-toolbar select { border:1px solid #ddd; border-radius:8px; padding:8px 12px; font-size:14px; color:var(--brun); outline:none; }
  .hist-toolbar input:focus { border-color:var(--or); }
  .btn-rechercher { background:var(--brun); color:var(--creme); border:none; padding:9px 20px; border-radius:8px; font-size:13px; cursor:pointer; letter-spacing:1px; }

  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
  .stat-card { background:#fff; border-radius:10px; padding:16px; text-align:center; box-shadow:0 2px 8px rgba(44,26,14,0.08); }
  .stat-valeur { font-family:Georgia,serif; font-size:28px; color:var(--or); }
  .stat-label { font-size:11px; color:var(--gris); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  .top-plats { background:#fff; border-radius:10px; padding:16px; margin-bottom:16px; box-shadow:0 2px 8px rgba(44,26,14,0.08); }
  .top-plats h3 { font-family:Georgia,serif; font-size:16px; font-style:italic; color:var(--brun); margin-bottom:12px; }
  .top-plat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0ebe0; font-size:14px; }
  .top-plat-row:last-child { border-bottom:none; }
  .top-plat-qty { background:var(--or); color:var(--brun); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:13px; }

  .commandes-list { background:#fff; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(44,26,14,0.08); }
  .commandes-list h3 { font-family:Georgia,serif; font-size:16px; font-style:italic; color:var(--brun); margin-bottom:12px; }
  .cmd-row { padding:10px 0; border-bottom:1px solid #f0ebe0; font-size:13px; }
  .cmd-row:last-child { border-bottom:none; }
  .cmd-row-header { display:flex; justify-content:space-between; margin-bottom:4px; }
  .cmd-table { font-weight:bold; color:var(--brun); }
  .cmd-heure { color:var(--gris); }
  .cmd-total { color:var(--or); font-family:Georgia,serif; }
  .cmd-items { color:var(--gris); line-height:1.6; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--brun); color:var(--creme); padding:12px 24px; border-radius:50px; font-size:13px; letter-spacing:1px; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:999; }
  .toast.visible { opacity:1; }
  .btn-deconnexion { background:transparent; border:1px solid rgba(255,255,255,0.2); color:var(--creme); padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="ecran-login">
  <p class="login-titre">Le 37 Partners Lounge</p>
  <p class="login-sous">Administration</p>
  <div class="login-box">
    <label>Mot de passe</label>
    <input type="password" id="input-mdp" placeholder="••••••••" onkeydown="if(event.key==='Enter') seConnecter()">
    <button class="btn-login" onclick="seConnecter()">Accéder</button>
    <p class="msg-login-erreur" id="msg-login"></p>
  </div>
</div>

<!-- APP ADMIN -->
<div id="ecran-app">
  <header>
    <h1>⚙ Administration</h1>
    <button class="btn-deconnexion" onclick="seDeconnecter()">Déconnexion</button>
  </header>
  <nav class="nav-admin">
    <button class="nav-btn active" onclick="afficherPage('menu', this)">📋 Menu</button>
    <button class="nav-btn" onclick="afficherPage('historique', this)">📊 Historique</button>
  </nav>

  <!-- PAGE MENU -->
  <div class="page visible" id="page-menu">
    <div id="contenu-menu-admin"></div>
  </div>

  <!-- PAGE HISTORIQUE -->
  <div class="page" id="page-historique">
    <div class="hist-toolbar">
      <div>
        <label>Période</label>
        <select id="hist-type" onchange="mettreAJourInputDate()">
          <option value="jour">Jour</option>
          <option value="semaine">Semaine</option>
          <option value="mois">Mois</option>
        </select>
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="hist-date">
      </div>
      <button class="btn-rechercher" onclick="chargerHistorique()">Rechercher</button>
    </div>
    <div id="contenu-historique"><p style="color:var(--gris);text-align:center;padding:40px;">Sélectionnez une période et cliquez sur Rechercher</p></div>
  </div>
</div>

<!-- MODAL EDIT PLAT -->
<div class="modal-bg" id="modal-edit">
  <div class="modal-edit">
    <h3 id="modal-edit-titre">Modifier le plat</h3>
    <input type="hidden" id="edit-cat-id">
    <input type="hidden" id="edit-plat-idx">
    <div class="form-group">
      <label>Nom du plat</label>
      <input type="text" id="edit-nom">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="edit-desc" rows="2"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Prix (€)</label>
        <input type="number" id="edit-prix" step="0.10" min="0">
      </div>
      <div class="form-group">
        <label>Plat du jour ?</label>
        <select id="edit-jour">
          <option value="false">Non</option>
          <option value="true">Oui</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stock (vide = illimité)</label>
        <input type="number" id="edit-stock" min="0" placeholder="ex: 10">
      </div>
      <div class="form-group">
        <label>Remettre à zéro</label>
        <button type="button" onclick="reinitStock()" style="width:100%;background:#f0ebe0;border:1px solid #ddd;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--brun);">↺ Reset stock</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-annuler" onclick="fermerModalEdit()">Annuler</button>
      <button class="btn-sauvegarder" onclick="sauvegarderPlat()">Sauvegarder</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let token = sessionStorage.getItem('admin_token') || '';
  let menuAdmin = [];

  // ── AUTH ──
  async function seConnecter() {
    const mdp = document.getElementById('input-mdp').value;
    const r = await fetch('/api/admin/menu', { headers: { 'Authorization': 'Bearer ' + mdp } });
    if (r.ok) {
      token = mdp;
      sessionStorage.setItem('admin_token', token);
      menuAdmin = await r.json();
      document.getElementById('ecran-login').style.display = 'none';
      document.getElementById('ecran-app').style.display = 'block';
      construireMenuAdmin();
      mettreAJourInputDate();
      connecterWS();
    } else {
      document.getElementById('msg-login').textContent = 'Mot de passe incorrect';
    }
  }

  function seDeconnecter() {
    sessionStorage.removeItem('admin_token');
    token = '';
    document.getElementById('ecran-app').style.display = 'none';
    document.getElementById('ecran-login').style.display = 'flex';
    document.getElementById('input-mdp').value = '';
  }

  // Vérifier si déjà connecté
  if (token) {
    fetch('/api/admin/menu', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data) {
          menuAdmin = data;
          document.getElementById('ecran-login').style.display = 'none';
          document.getElementById('ecran-app').style.display = 'block';
          construireMenuAdmin();
          mettreAJourInputDate();
        }
      });
  }

  // ── MENU ──
  function construireMenuAdmin() {
    const cont = document.getElementById('contenu-menu-admin');
    cont.innerHTML = menuAdmin.map((cat, ci) => `
      <div class="cat-card">
        <div class="cat-header">
          <div>
            <div class="cat-titre">${cat.categorie}</div>
            ${cat.service ? `<div class="cat-service">${cat.service}</div>` : ''}
          </div>
        </div>
        ${cat.plats.map((plat, pi) => `
          <div class="plat-row">
            <div class="plat-infos">
              <div class="plat-row-nom">${plat.nom}</div>
              ${plat.description ? `<div class="plat-row-desc">${plat.description}</div>` : ''}
            </div>
            <div class="plat-row-prix">${plat.prix.toFixed(2).replace('.', ',')} €</div>
            <div class="stock-badge ${plat.stock === 0 ? 'epuise' : ''}" title="Stock restant">
              ${plat.stock !== undefined && plat.stock !== null ? plat.stock + ' restant' + (plat.stock > 1 ? 's' : '') : '∞'}
            </div>
            <button class="badge-jour-toggle ${plat.plat_du_jour ? 'on' : 'off'}" onclick="toggleJour('${cat._id}', ${pi}, this)" title="Plat du jour">${plat.plat_du_jour ? 'Du jour' : 'Fixe'}</button>
            <button class="toggle-actif ${plat.actif ? 'on' : 'off'}" onclick="toggleActif('${cat._id}', ${pi}, this)" title="${plat.actif ? 'Visible' : 'Masqué'}"></button>
            <button class="btn-edit-plat" onclick="ouvrirEdit('${cat._id}', ${pi})">✎</button>
          </div>
        `).join('')}
        <button class="btn-add-plat" onclick="ouvrirNouveauPlat('${cat._id}')">+ Ajouter un plat</button>
      </div>
    `).join('');
  }

  async function toggleActif(catId, platIdx, btn) {
    const cat = menuAdmin.find(c => c._id === catId);
    if (!cat) return;
    cat.plats[platIdx].actif = !cat.plats[platIdx].actif;
    btn.className = 'toggle-actif ' + (cat.plats[platIdx].actif ? 'on' : 'off');
    await fetch('/api/admin/menu/' + catId + '/plat/' + platIdx, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(cat.plats[platIdx])
    });
    afficherToast(cat.plats[platIdx].actif ? 'Plat affiché ✓' : 'Plat masqué ✓');
  }

  async function toggleJour(catId, platIdx, btn) {
    const cat = menuAdmin.find(c => c._id === catId);
    if (!cat) return;
    cat.plats[platIdx].plat_du_jour = !cat.plats[platIdx].plat_du_jour;
    btn.className = 'badge-jour-toggle ' + (cat.plats[platIdx].plat_du_jour ? 'on' : 'off');
    btn.textContent = cat.plats[platIdx].plat_du_jour ? 'Du jour' : 'Fixe';
    await fetch('/api/admin/menu/' + catId + '/plat/' + platIdx, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(cat.plats[platIdx])
    });
    afficherToast('Mis à jour ✓');
  }

  function ouvrirEdit(catId, platIdx) {
    const cat = menuAdmin.find(c => c._id === catId);
    if (!cat) return;
    const plat = cat.plats[platIdx];
    document.getElementById('edit-cat-id').value = catId;
    document.getElementById('edit-plat-idx').value = platIdx;
    document.getElementById('edit-nom').value = plat.nom;
    document.getElementById('edit-desc').value = plat.description || '';
    document.getElementById('edit-prix').value = plat.prix;
    document.getElementById('edit-jour').value = plat.plat_du_jour ? 'true' : 'false';
    document.getElementById('edit-stock').value = (plat.stock !== undefined && plat.stock !== null) ? plat.stock : '';
    document.getElementById('modal-edit-titre').textContent = 'Modifier — ' + plat.nom;
    document.getElementById('modal-edit').classList.add('open');
  }

  function reinitStock() {
    const stockInput = document.getElementById('edit-stock');
    const valOrigine = stockInput.getAttribute('data-original') || '';
    stockInput.value = valOrigine;
    afficherToast('Stock remis à la valeur initiale');
  }

  function ouvrirNouveauPlat(catId) {
    document.getElementById('edit-cat-id').value = catId;
    document.getElementById('edit-plat-idx').value = '-1';
    document.getElementById('edit-nom').value = '';
    document.getElementById('edit-desc').value = '';
    document.getElementById('edit-prix').value = '';
    document.getElementById('edit-jour').value = 'false';
    document.getElementById('edit-stock').value = '';
    document.getElementById('modal-edit-titre').textContent = 'Nouveau plat';
    document.getElementById('modal-edit').classList.add('open');
  }

  function fermerModalEdit() { document.getElementById('modal-edit').classList.remove('open'); }

  async function sauvegarderPlat() {
    const catId = document.getElementById('edit-cat-id').value;
    const platIdx = parseInt(document.getElementById('edit-plat-idx').value);
    const stockVal = document.getElementById('edit-stock').value;
    const plat = {
      nom: document.getElementById('edit-nom').value.trim(),
      description: document.getElementById('edit-desc').value.trim(),
      prix: parseFloat(document.getElementById('edit-prix').value),
      plat_du_jour: document.getElementById('edit-jour').value === 'true',
      stock: stockVal !== '' ? parseInt(stockVal) : null,
      actif: true
    };
    if (!plat.nom || isNaN(plat.prix)) { alert('Nom et prix obligatoires'); return; }
    // Le plat reste toujours actif — c'est le stock=0 qui bloque la commande

    if (platIdx === -1) {
      await fetch('/api/admin/menu/' + catId + '/plat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(plat)
      });
    } else {
      const cat = menuAdmin.find(c => c._id === catId);
      plat.actif = cat.plats[platIdx].actif;
      await fetch('/api/admin/menu/' + catId + '/plat/' + platIdx, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(plat)
      });
    }

    fermerModalEdit();
    const r = await fetch('/api/admin/menu', { headers: { 'Authorization': 'Bearer ' + token } });
    menuAdmin = await r.json();
    construireMenuAdmin();
    afficherToast('Sauvegardé ✓');
  }

  // ── HISTORIQUE ──
  function mettreAJourInputDate() {
    const type = document.getElementById('hist-type').value;
    const input = document.getElementById('hist-date');
    input.type = type === 'mois' ? 'month' : 'date';
    input.value = type === 'mois'
      ? new Date().toISOString().slice(0, 7)
      : new Date().toISOString().split('T')[0];
  }

  async function chargerHistorique() {
    const type = document.getElementById('hist-type').value;
    const valeur = document.getElementById('hist-date').value;
    if (!valeur) return;

    let url, label;
    if (type === 'jour') { url = '/api/historique/jour/' + valeur; label = 'du ' + valeur; }
    else if (type === 'semaine') { url = '/api/historique/semaine/' + getSemaineFromDate(valeur); label = 'semaine du ' + valeur; }
    else { url = '/api/historique/mois/' + valeur; label = 'de ' + valeur; }

    const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
    const { commandes, stats } = await r.json();
    afficherHistorique(commandes, stats, label);
  }

  function afficherHistorique(commandes, stats, label) {
    const cont = document.getElementById('contenu-historique');
    if (!commandes.length) {
      cont.innerHTML = '<p style="color:var(--gris);text-align:center;padding:40px;">Aucune commande ' + label + '</p>';
      return;
    }
    cont.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-valeur">${stats.nb_commandes}</div><div class="stat-label">Commandes</div></div>
        <div class="stat-card"><div class="stat-valeur">${stats.ca.toFixed(2).replace('.', ',')} €</div><div class="stat-label">Chiffre d'affaires</div></div>
        <div class="stat-card"><div class="stat-valeur">${stats.nb_commandes ? (stats.ca / stats.nb_commandes).toFixed(2).replace('.', ',') + ' €' : '—'}</div><div class="stat-label">Panier moyen</div></div>
      </div>
      <div class="top-plats">
        <h3>Top plats commandés</h3>
        ${stats.top_plats.map((p, i) => `
          <div class="top-plat-row">
            <span>${i + 1}. ${p.nom}</span>
            <div class="top-plat-qty">${p.qty}</div>
          </div>`).join('')}
      </div>
      <div class="commandes-list">
        <h3>Détail des commandes (${commandes.length})</h3>
        ${commandes.map(c => `
          <div class="cmd-row">
            <div class="cmd-row-header">
              <span class="cmd-table">Table ${c.table}</span>
              <span class="cmd-heure">${c.heure}</span>
              <span class="cmd-total">${(c.total || 0).toFixed(2).replace('.', ',')} €</span>
            </div>
            <div class="cmd-items">${(c.items || []).map(i => i.qty + '× ' + i.nom).join(' — ')}</div>
          </div>`).join('')}
      </div>`;
  }

  function getSemaineFromDate(dateStr) {
    const d = new Date(dateStr);
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
    const week1 = new Date(d.getFullYear(), 0, 4);
    const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
    return d.getFullYear() + '-S' + String(weekNum).padStart(2, '0');
  }

  function afficherPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('visible');
    btn.classList.add('active');
  }

  function afficherToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2500);
  }

  document.getElementById('modal-edit').addEventListener('click', function(e) {
    if (e.target === this) fermerModalEdit();
  });

  document.getElementById('input-mdp').addEventListener('keydown', e => {
    if (e.key === 'Enter') seConnecter();
  });

  // ── WebSocket — mise à jour en temps réel du menu admin ──
  let wsAdmin = null;
  function connecterWS() {
    if (!token) return;
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    wsAdmin = new WebSocket(proto + '://' + location.host + '?role=admin');
    wsAdmin.onmessage = async (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'menu_mis_a_jour') {
        const r = await fetch('/api/admin/menu', { headers: { 'Authorization': 'Bearer ' + token } });
        if (r.ok) {
          menuAdmin = await r.json();
          construireMenuAdmin();
        }
      }
    };
    wsAdmin.onclose = () => setTimeout(connecterWS, 3000);
  }

  // Lancer la connexion WebSocket si déjà connecté au chargement
  if (token) connecterWS();
</script>
</body>
</html>
