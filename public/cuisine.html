<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuisine — Le 37 Partners Lounge</title>
<style>
  :root {
    --bg:     #1a1a1a;
    --card:   #2a2a2a;
    --border: #3a3a3a;
    --or:     #D4A017;
    --vert:   #2ecc71;
    --rouge:  #e74c3c;
    --texte:  #f0f0f0;
    --gris:   #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--texte); font-family: 'Arial', sans-serif; min-height: 100vh; }

  header {
    background: #111;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--or);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 20px; color: var(--or); letter-spacing: 2px; text-transform: uppercase; }
  #statut-ws { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #333; }
  #statut-ws.connecte { background: #1a3a1a; color: var(--vert); }
  #statut-ws.deconnecte { background: #3a1a1a; color: var(--rouge); }

  .toolbar {
    padding: 12px 20px;
    background: #222;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .toolbar label { font-size: 13px; color: var(--gris); }
  .btn-reset {
    margin-left: auto;
    background: #3a1a1a;
    color: var(--rouge);
    border: 1px solid var(--rouge);
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .btn-reset:hover { background: var(--rouge); color: #fff; }

  #zone-commandes {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .vide {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--gris);
    font-size: 16px;
  }
  .vide span { display: block; font-size: 48px; margin-bottom: 16px; }

  /* Carte commande */
  .carte {
    background: var(--card);
    border-radius: 12px;
    border: 2px solid var(--border);
    overflow: hidden;
    transition: border-color 0.3s;
    animation: apparition 0.4s ease;
  }
  @keyframes apparition { from { opacity: 0; transform: translateY(-10px); } }

  .carte.nouvelle  { border-color: var(--or); }
  .carte.en_cours  { border-color: #3498db; }
  .carte.servie    { border-color: var(--vert); opacity: 0.5; }

  .carte-header {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #222;
  }
  .carte-table { font-size: 22px; font-weight: bold; color: var(--or); }
  .carte-heure { font-size: 12px; color: var(--gris); }
  .carte-statut {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .statut-nouvelle { background: rgba(212,160,23,0.2); color: var(--or); }
  .statut-en_cours { background: rgba(52,152,219,0.2); color: #3498db; }
  .statut-servie   { background: rgba(46,204,113,0.2); color: var(--vert); }

  .carte-items { padding: 14px 16px; }
  .item-ligne {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
  }
  .item-ligne:last-child { border-bottom: none; }
  .item-qty {
    background: var(--or);
    color: #000;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold;
    font-size: 14px;
    flex-shrink: 0;
  }
  .item-nom { flex: 1; margin-left: 12px; }

  .carte-footer {
    padding: 12px 16px;
    background: #222;
    display: flex;
    gap: 8px;
  }
  .btn-action {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    font-weight: bold;
    transition: opacity 0.2s;
  }
  .btn-action:hover { opacity: 0.85; }
  .btn-encours { background: #2980b9; color: #fff; }
  .btn-servie  { background: #27ae60; color: #fff; }
  .btn-sup     { background: #444; color: var(--gris); font-size: 11px; flex: 0; padding: 10px 14px; }

  #compteur { font-size: 13px; color: var(--gris); }
  #compteur strong { color: var(--or); }

  /* Alerte nouvelle commande */
  #alerte {
    position: fixed;
    top: 70px; right: 20px;
    background: var(--or);
    color: #000;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 15px;
    display: none;
    z-index: 999;
    animation: pulse 0.5s ease;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
</style>
</head>
<body>

<header>
  <h1>🍳 Cuisine — Le 37 Partners Lounge</h1>
  <span id="statut-ws" class="deconnecte">Déconnecté</span>
</header>

<div class="toolbar">
  <span id="compteur"><strong>0</strong> commande(s) en attente</span>
  <button class="btn-reset" onclick="confirmerReset()">⟳ Fin de service</button>
</div>

<div id="zone-commandes">
  <div class="vide"><span>🍽</span>En attente de commandes…</div>
</div>

<div id="alerte">🔔 Nouvelle commande !</div>

<audio id="son-alerte" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav">
</audio>

<script>
  let commandes = {};
  let ws;

  function connecter() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '?role=cuisine');

    ws.onopen = () => {
      document.getElementById('statut-ws').textContent = '● Connecté';
      document.getElementById('statut-ws').className = 'connecte';
    };

    ws.onclose = () => {
      document.getElementById('statut-ws').textContent = '● Déconnecté';
      document.getElementById('statut-ws').className = 'deconnecte';
      setTimeout(connecter, 3000); // reconnexion auto
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);

      if (msg.type === 'historique') {
        commandes = {};
        msg.commandes.forEach(c => { commandes[c.id] = c; });
        afficher();
      }

      if (msg.type === 'nouvelle_commande') {
        commandes[msg.commande.id] = msg.commande;
        afficher();
        jouerAlerte();
      }

      if (msg.type === 'maj_statut') {
        if (commandes[msg.id]) {
          commandes[msg.id].statut = msg.statut;
          afficher();
        }
      }

      if (msg.type === 'reinitialisation') {
        commandes = {};
        afficher();
      }
    };
  }

  function afficher() {
    const zone = document.getElementById('zone-commandes');
    const liste = Object.values(commandes)
      .filter(c => c.statut !== 'servie' || Date.now() - c.id < 120000)
      .sort((a, b) => a.id - b.id);

    const enAttente = Object.values(commandes).filter(c => c.statut === 'nouvelle').length;
    document.getElementById('compteur').innerHTML = '<strong>' + enAttente + '</strong> commande(s) en attente';

    if (liste.length === 0) {
      zone.innerHTML = '<div class="vide"><span>🍽</span>En attente de commandes…</div>';
      return;
    }

    zone.innerHTML = liste.map(c => `
      <div class="carte ${c.statut}" id="carte-${c.id}">
        <div class="carte-header">
          <div>
            <div class="carte-table">Table ${c.table}</div>
            <div class="carte-heure">${c.heure}</div>
          </div>
          <span class="carte-statut statut-${c.statut}">${labelStatut(c.statut)}</span>
        </div>
        <div class="carte-items">
          ${c.items.map(i => `
            <div class="item-ligne">
              <div class="item-qty">${i.qty}</div>
              <div class="item-nom">${i.nom}</div>
            </div>
          `).join('')}
        </div>
        <div class="carte-footer">
          ${c.statut === 'nouvelle' ? `<button class="btn-action btn-encours" onclick="changerStatut(${c.id}, 'en_cours')">En cours</button>` : ''}
          ${c.statut === 'en_cours' ? `<button class="btn-action btn-servie" onclick="changerStatut(${c.id}, 'servie')">✓ Servie</button>` : ''}
          ${c.statut === 'servie' ? `<button class="btn-action btn-servie" disabled>✓ Servie</button>` : ''}
          <button class="btn-action btn-sup" onclick="changerStatut(${c.id}, 'servie')" title="Marquer comme servie">✕</button>
        </div>
      </div>
    `).join('');
  }

  function labelStatut(s) {
    return { nouvelle: '🔴 Nouvelle', en_cours: '🔵 En cours', servie: '🟢 Servie' }[s] || s;
  }

  function changerStatut(id, statut) {
    fetch('/commande/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ statut })
    });
  }

  function jouerAlerte() {
    const alerte = document.getElementById('alerte');
    alerte.style.display = 'block';
    setTimeout(() => { alerte.style.display = 'none'; }, 3000);
    // Son natif navigateur
    try { new Audio('data:audio/mpeg;base64,/+M').play(); } catch(e) {}
  }

  function confirmerReset() {
    if (confirm('Effacer toutes les commandes ? (Fin de service)')) {
      fetch('/commandes', { method: 'DELETE' });
    }
  }

  connecter();
</script>
</body>
</html>
