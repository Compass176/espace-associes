<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — Le 37 Partners Lounge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --blanc: #FFFFFF; --noir: #000000; --vert2: #1e6e0a; --vert: #26890D; --gris3: #888888; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--creme); color:var(--noir); font-family:Arial,sans-serif; padding:30px 20px; }

  h1 { font-family:Georgia,serif; font-size:26px; font-weight:400; font-style:italic; text-align:center; margin-bottom:6px; }
  .sous-titre { text-align:center; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--vert); margin-bottom:20px; }

  .info-url {
    background:#fff;
    border-radius:12px;
    padding:16px 20px;
    margin-bottom:24px;
    box-shadow:0 2px 10px rgba(44,26,14,0.08);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
  }
  .info-url-label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gris); margin-bottom:4px; }
  .info-url-valeur { font-size:14px; color:var(--noir); font-weight:500; word-break:break-all; }
  .btn-imprimer {
    background:var(--noir); color:var(--creme); border:none;
    padding:10px 24px; border-radius:8px; font-size:13px;
    letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
    transition:all 0.2s; flex-shrink:0;
  }
  .btn-imprimer:hover { background:var(--vert); color:var(--noir); }

  .carte-qr {
    background:#fff; border-radius:16px; padding:32px 28px 24px;
    text-align:center; box-shadow:0 4px 20px rgba(44,26,14,0.12);
    border:1px solid rgba(184,134,11,0.2); max-width:320px; margin:0 auto;
  }
  .ligne-or { width:40px; height:2px; background:var(--vert); margin:0 auto 16px; }
  .resto-nom { font-family:Georgia,serif; font-size:20px; font-style:italic; color:var(--noir); margin-bottom:4px; }
  .resto-sous { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gris); margin-bottom:20px; }
  .qr-box { display:flex; justify-content:center; margin-bottom:20px; padding:12px; background:var(--creme); border-radius:12px; }
  .invite-titre { font-family:Georgia,serif; font-size:16px; font-style:italic; color:var(--noir); margin-bottom:4px; }
  .invite-texte { font-size:12px; color:var(--gris); line-height:1.5; }
  .url-texte { font-size:9px; color:var(--gris); word-break:break-all; margin-top:14px; padding-top:12px; border-top:1px solid #eee; }

  @media print {
    body { background:#fff; padding:10px; }
    .info-url, h1, .sous-titre { display:none; }
    .carte-qr { box-shadow:none; border:1px solid #ddd; margin:0 auto; }
  }
</style>
</head>
<body>

<h1>Le 37 Partners Lounge</h1>
<p class="sous-titre">QR Code — Menu en ligne</p>

<div class="info-url">
  <div>
    <div class="info-url-label">Adresse du menu</div>
    <div class="info-url-valeur" id="affichage-url"></div>
  </div>
  <button class="btn-imprimer" onclick="window.print()">🖨 Imprimer</button>
</div>

<div id="zone-qr"></div>

<script>
  // Détection automatique de l'adresse — utilise l'URL actuelle de la page
  const url = window.location.origin;

  document.getElementById('affichage-url').textContent = url;

  const zone = document.getElementById('zone-qr');
  const carte = document.createElement('div');
  carte.className = 'carte-qr';
  carte.innerHTML =
    '<div class="ligne-or"></div>' +
    '<div class="resto-nom">Le 37 Partners Lounge</div>' +
    '<div class="resto-sous">Menu de la semaine</div>' +
    '<div class="qr-box" id="qr-unique"></div>' +
    '<div class="invite-titre">Commandez depuis votre chevalet</div>' +
    '<div class="invite-texte">Scannez ce QR code avec votre téléphone,<br>choisissez votre numéro de chevalet<br>et passez commande directement.</div>' +
    '<div class="url-texte">' + url + '</div>';
  zone.appendChild(carte);

  new QRCode(document.getElementById('qr-unique'), {
    text:         url,
    width:        200,
    height:       200,
    colorDark:    '#2C1A0E',
    colorLight:   '#F5F0E8',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
