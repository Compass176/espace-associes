<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — L'Espace Associés</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --creme:#F5F0E8; --brun:#2C1A0E; --brun2:#5C3D2E; --or:#B8860B; --gris:#9E9082; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--creme); color:var(--brun); font-family:Arial,sans-serif; padding:30px 20px; }

  h1 { font-family:Georgia,serif; font-size:26px; font-weight:400; font-style:italic; text-align:center; margin-bottom:6px; }
  .sous-titre { text-align:center; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--or); margin-bottom:30px; }

  .config { background:#fff; border-radius:12px; padding:20px 24px; margin-bottom:28px; box-shadow:0 2px 10px rgba(44,26,14,0.08); display:flex; flex-wrap:wrap; gap:16px; align-items:flex-end; }
  .config label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gris); margin-bottom:6px; }
  .config input { border:1px solid #ddd; border-radius:6px; padding:8px 12px; font-size:14px; color:var(--brun); width:200px; }
  .config input:focus { outline:none; border-color:var(--or); }
  .btn { padding:10px 24px; border-radius:8px; font-size:13px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; border:none; transition:all 0.2s; }
  .btn-generer { background:var(--brun); color:var(--creme); }
  .btn-generer:hover { background:var(--or); color:var(--brun); }
  .btn-imprimer { background:transparent; color:var(--brun2); border:1px solid var(--brun2) !important; border:none; }
  .btn-imprimer:hover { background:var(--brun2); color:var(--creme); }

  /* Carte QR unique */
  .carte-qr {
    background:#fff;
    border-radius:16px;
    padding:32px 28px 24px;
    text-align:center;
    box-shadow:0 4px 20px rgba(44,26,14,0.12);
    border:1px solid rgba(184,134,11,0.2);
    max-width:320px;
    margin:0 auto;
  }
  .carte-qr .ligne-or { width:40px; height:2px; background:var(--or); margin:0 auto 16px; }
  .carte-qr .resto-nom { font-family:Georgia,serif; font-size:20px; font-style:italic; color:var(--brun); margin-bottom:4px; }
  .carte-qr .resto-sous { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gris); margin-bottom:20px; }
  .carte-qr .qr-box { display:flex; justify-content:center; margin-bottom:20px; padding:12px; background:var(--creme); border-radius:12px; }
  .carte-qr .invite-titre { font-family:Georgia,serif; font-size:16px; font-style:italic; color:var(--brun); margin-bottom:4px; }
  .carte-qr .invite-texte { font-size:12px; color:var(--gris); line-height:1.5; }
  .carte-qr .url-texte { font-size:9px; color:var(--gris); word-break:break-all; margin-top:14px; padding-top:12px; border-top:1px solid #eee; }

  @media print {
    body { background:#fff; padding:10px; }
    .config, h1, .sous-titre { display:none; }
    .carte-qr { box-shadow:none; border:1px solid #ddd; margin:0 auto; }
  }
</style>
</head>
<body>

<h1>L'Espace Associés</h1>
<p class="sous-titre">Générateur de QR code</p>

<div class="config">
  <div>
    <label>Adresse IP du serveur</label>
    <input type="text" id="ip" placeholder="192.168.1.42" value="192.168.1.42">
  </div>
  <div>
    <label>Port</label>
    <input type="text" id="port" value="3000" style="width:90px">
  </div>
  <button class="btn btn-generer" onclick="generer()">Générer</button>
  <button class="btn btn-imprimer" onclick="window.print()">🖨 Imprimer</button>
</div>

<div id="zone-qr"></div>

<script>
  function generer() {
    const ip   = document.getElementById('ip').value.trim() || '192.168.1.42';
    const port = document.getElementById('port').value.trim() || '3000';
    const url  = 'http://' + ip + ':' + port;

    const zone = document.getElementById('zone-qr');
    zone.innerHTML = '';

    const carte = document.createElement('div');
    carte.className = 'carte-qr';
    carte.innerHTML =
      '<div class="ligne-or"></div>' +
      '<div class="resto-nom">L\'Espace Associés</div>' +
      '<div class="resto-sous">Menu du 26 au 29 mai</div>' +
      '<div class="qr-box" id="qr-unique"></div>' +
      '<div class="invite-titre">Commandez depuis votre table</div>' +
      '<div class="invite-texte">Scannez ce QR code avec votre téléphone,<br>choisissez votre numéro de table<br>et passez commande directement.</div>' +
      '<div class="url-texte">' + url + '</div>';
    zone.appendChild(carte);

    new QRCode(document.getElementById('qr-unique'), {
      text:         url,
      width:        200,
      height:       200,
      colorDark:    '#2C1A0E',
      colorLight:   '#F5F0E8',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  window.onload = generer;
</script>
</body>
</html>
