<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serveurs — L'Espace Associés</title>
<style>
  :root {
    --bg:    #F5F0E8;
    --brun:  #2C1A0E;
    --brun2: #5C3D2E;
    --or:    #B8860B;
    --vert:  #27ae60;
    --rouge: #e74c3c;
    --gris:  #9E9082;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--brun); font-family: Arial, sans-serif; min-height: 100vh; }

  header {
    background: var(--brun);
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { color: var(--bg); font-size: 17px; letter-spacing: 1px; }
  #statut-ws { font-size: 11px; padding: 3px 10px; border-radius: 20px; }
  #statut-ws.connecte { background: #1a3a1a; color: #2ecc71; }
  #statut-ws.deconnecte { background: #3a1a1a; color: var(--rouge); }

  #zone { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .vide { text-align: center; padding: 60px 20px; color: var(--gris); }
  .vide span { display: block; font-size: 40px; margin-bottom: 12px; }

  .notif {
    background: #fff;
    border-radius: 12px;
    border-left: 4px solid var(--or);
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(44,26,14,0.1);
    animation: glisse 0.35s ease;
  }
  @keyframes glisse { from { opacity:0; transform:translateX(-12px); } }
  .notif.en_cours { border-left-color: #3498db; }
  .notif.servie   { border-left-color: var(--vert); opacity: 0.6; }

  .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .notif-table  { font-size: 18px; font-weight: bold; color: var(--brun); }
  .notif-heure  { font-size: 11px; color: var(--gris); }
  .notif-badge  { font-size: 10px; padding: 2px 8px; border-radius: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .badge-nouvelle { background: rgba(184,134,11,0.15); color: var(--or); }
  .badge-en_cours { background: rgba(52,152,219,0.15); color: #2980b9; }
  .badge-servie   { background: rgba(39,174,96,0.15);  color: var(--vert); }

  .notif-items { font-size: 14px; color: var(--brun2); line-height: 1.8; }
  .notif-item-ligne { display: flex; gap: 8px; }
  .notif-qty { font-weight: bold; color: var(--or); min-width: 20px; }

  .notif-footer { margin-top: 10px; display: flex; gap: 8px; }
  .btn { flex:1; padding: 9px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; letter-spacing: 1px; font-weight: bold; }
  .btn-bleu  { background: #2980b9; color: #fff; }
  .btn-vert  { background: var(--vert); color: #fff; }
  .btn-gris  { background: #e0d8cc; color: var(--gris); flex: 0; padding: 9px 14px; }

  /* Bandeau flash */
  #flash {
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--or); color: var(--brun);
    text-align: center; padding: 12px;
    font-weight: bold; font-size: 16px;
    display: none; z-index: 100;
    animation: cligno 0.4s ease;
  }
  @keyframes cligno { 0%,100%{opacity:1} 50%{opacity:0.6} }
</style>
</head>
<body>

<header>
  <h1>🛎 Serveurs — L'Espace Associés</h1>
  <span id="statut-ws" class="deconnecte">Déco.</span>
</header>

<div id="flash">🔔 Nouvelle commande !</div>
<div id="zone">
  <div class="vide"><span>🛎</span>En attente de commandes…</div>
</div>

<script>
  let commandes = {};
  let ws;

  function connecter() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host + '?role=serveur');

    ws.onopen = () => {
      document.getElementById('statut-ws').textContent = '● OK';
      document.getElementById('statut-ws').className = 'connecte';
    };
    ws.onclose = () => {
      document.getElementById('statut-ws').textContent = '● Déco.';
      document.getElementById('statut-ws').className = 'deconnecte';
      setTimeout(connecter, 3000);
    };
    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'historique') {
        commandes = {};
        msg.commandes.forEach(c => commandes[c.id] = c);
        afficher();
      }
      if (msg.type === 'nouvelle_commande') {
        commandes[msg.commande.id] = msg.commande;
        afficher();
        flash();
      }
      if (msg.type === 'maj_statut') {
        if (commandes[msg.id]) { commandes[msg.id].statut = msg.statut; afficher(); }
      }
      if (msg.type === 'reinitialisation') { commandes = {}; afficher(); }
    };
  }

  function afficher() {
    const zone = document.getElementById('zone');
    const liste = Object.values(commandes)
      .filter(c => c.statut !== 'servie')
      .sort((a,b) => a.id - b.id);

    if (liste.length === 0) {
      zone.innerHTML = '<div class="vide"><span>🛎</span>En attente de commandes…</div>';
      return;
    }
    zone.innerHTML = liste.map(c => `
      <div class="notif ${c.statut}">
        <div class="notif-header">
          <div>
            <div class="notif-table">Table ${c.table}</div>
            <div class="notif-heure">${c.heure}</div>
          </div>
          <span class="notif-badge badge-${c.statut}">${labelStatut(c.statut)}</span>
        </div>
        <div class="notif-items">
          ${c.items.map(i => `<div class="notif-item-ligne"><span class="notif-qty">×${i.qty}</span><span>${i.nom}</span></div>`).join('')}
        </div>
        <div class="notif-footer">
          ${c.statut === 'nouvelle' ? `<button class="btn btn-bleu" onclick="changer(${c.id},'en_cours')">En cours</button>` : ''}
          <button class="btn btn-vert" onclick="changer(${c.id},'servie')">✓ Servi</button>
        </div>
      </div>
    `).join('');
  }

  function labelStatut(s) {
    return { nouvelle:'🔴 Nouvelle', en_cours:'🔵 En cours', servie:'🟢 Servie' }[s] || s;
  }

  function changer(id, statut) {
    fetch('/commande/' + id, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ statut })
    });
  }

  function flash() {
    const f = document.getElementById('flash');
    f.style.display = 'block';
    setTimeout(() => f.style.display = 'none', 2500);
    try { new Audio().play(); } catch(e) {}
  }

  connecter();
</script>
</body>
</html>
